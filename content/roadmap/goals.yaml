  description: "Visualisierung der Abstimmungsergebnisse als Kreisdiagramme – gesamt und nach Fraktionen."
  phase: beta
  status: done

- title: "Gesetz suchen"
  description: "Volltextsuche über alle Bundestagsvorgänge und Drucksachen."
  phase: beta
  status: done

- title: "Wahl-O-Meter"

- title: "Live-Daten aus dem Bundestag"
  description: "Aktuelle und vergangene Abstimmungen, Vorgänge und Drucksachen direkt aus dem parlamentarischen Informationssystem."
  phase: beta
  status: done

- title: "Nutzerabstimmung"
  description: "Eigene Stimme zu Bundestagsabstimmungen abgeben – Ja, Enthaltung oder Nein."
  phase: beta
  status: done

- title: "Push-Benachrichtigungen"
  description: "Benachrichtigungen über neue Abstimmungen, Ergebnisse und Updates."
  phase: beta
  status: done


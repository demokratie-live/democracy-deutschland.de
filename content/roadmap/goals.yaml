  description: "Detaillierte Darstellung der Abstimmungsergebnisse nach Fraktionen als Balkendiagramme."
  phase: mvp
  status: done

- title: "Desktop-Version"
  description: "DEMOCRACY als Web-App für den Desktop-Browser."
  phase: mvp

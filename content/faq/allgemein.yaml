- question: "Gebt ihr meine Daten an Dritte weiter?"
  answer: >-
    Die Betreiber der App DEMOCRACY nehmen den Schutz Deiner persönlichen Daten
    sehr ernst. Unserer Meinung nach sind Nutzerdaten gerade keine handelbaren
    Wirtschaftsgüter, sondern im Sinne des Grundgesetzes zu schützen. Deshalb
    behandeln wir Deine personenbezogenen wie Abstimmungs-Daten vertraulich
    entsprechend den gesetzlichen Datenschutzrichtlinien und geben sie
    selbstverständlich nicht an Dritte weiter. Damit Du Dich bei der Nutzung
    unserer App sicher fühlst, informieren wir Dich in unserer
    Datenschutzerklärung zusätzlich zu den gesetzlichen Bestimmungen darüber,
    welche Daten wir warum erheben und wie wir diese verarbeiten und nutzen.
    Unser Konzept zur Aufrechterhaltung des Abstimmungs- bzw. Wahlgeheimnis
    innerhalb der App DEMOCRACY kannst du hier nachlesen:
    https://github.com/demokratie-live/democracy-development/wiki/Stimmanonymität
  category: datenschutz

- question: "Wie stellt ihr meine Stimmanonymität sicher?"
  answer: >-
    Wahlgeheimnis bedeutet, dass während und nach einer Wahl keine Information
    bekannt werden darf, die darauf schließen lässt, was ein Wähler gewählt hat.
    Im Konkreten geht es also um die Trennung von Person und Stimme in
    Urnenbuch und Auszählung. Die Aufrechterhaltung dieses Abstimmungs- bzw.
    Wahlgeheimnis ist zentraler Bestandteil der DNA der DEMOCRACY App.
    Unser Konzept sieht dafür vor, jede Deiner Abstimmungsentscheidungen
    (Ja, Enthaltung, Nein als Stimme) von Deinen personenbezogenen
    Identifikationsdaten (dem Urnenbuch) zu trennen. Technisch lösen wir das
    ganze durch eine sogenannte serverseitige Profiling-Daten-Vermeidung.
    Praktisch wird dabei eine Quittung Deiner Abstimmungsentscheidung lediglich
    lokal auf Deinem Handy gespeichert, während Deine Stimme serverseitig von
    Anfang an nur akkumuliert gespeichert wird.
    Deine Stimmanonymität stellen wir also sicher, indem wir Deine Stimme
    serverseitig nur akkumuliert speichern, wir keinen Servertraffic loggen
    und wir kein Datum zu Deiner Stimmabgabe speichern.
    Das vollständige Konzept zur Stimmanonymisierung kannst du hier nachlesen:
    https://github.com/demokratie-live/democracy-development/wiki/Stimmanonymität
  category: datenschutz

- question: "Sensible Daten und Open Source – geht das?"
  answer: >-
    Open Source bedeutet, dass der Quellcode frei und offen ist. Die Daten der
    Nutzer sind kein Bestandteil des Quellcodes, sondern der entsprechenden
    Installation des freien Programms auf einem Server. Insofern ist der
    unberechtigte Zugriff auf Nutzerdaten durch Dritte durch unsere
    Open-Source-Eigenschaft nicht angetastet. Überdies wird jede Änderung im
    Code, bevor sie in den Betrieb übergeht, von uns geprüft. Somit wird der
    hohe Anspruch an guter Programmierung gewahrt und auch verhindert, dass
    dubioser Code einfließen kann.
  category: datenschutz

- question: "Auf welchen Plattformen kann ich teilnehmen?"
  answer: >-
    An DEMOCRACY teilnehmen kannst Du via Smartphone mit iOS- oder
    Android-Betriebssystem. Die App ist kostenlos im App Store und Google Play
    Store verfügbar.
  category: beta

- question: "Wie kann ich die Beta installieren?"
  answer: >-
    Wir verwenden während des Prototyping die Store-eigenen Testkanäle des App-
    sowie Google PlayStore. Nach entsprechender Freischaltung bekommst Du von
    uns einen Zugangscode sowie Deine Plattform-spezifische
    Installationsanleitung per Mail übersendet.
  category: beta

- question: "Welche Funktionen sind in der BETA enthalten?"
  answer: >-
    DEMOCRACY bedeutet 1. Live Daten aus dem Bundestag, 2. eigene AppStimmung
    durch Dich als Nutzer und 3. eine crowdmodierte Diskussion zu den Anträgen.
    Im Prototyp realisiert sind davon die Live-Anbindung an die
    Bundestagsdaten sowie die Nutzerabstimmung. Die vollständige
    Funktionsübersicht kannst Du unserer Engineering-Seite entnehmen.
  category: beta

- question: "Wann kommt der Public MVP?"
  answer: >-
    Wir möchten so schnell wie möglich mit DEMOCRACY online gehen. Bis zu
    diesem Zeitpunkt müssen allerdings noch einige Meilensteine erreicht werden.
    Dafür brauchen wir Deine Hilfe – Gestalte DEMOCRACY mit Deiner Spende
    oder Deinen Fähigkeiten. Fragen zum Stand der Entwicklung kannst Du gerne
    an prototyping@democracy-deutschland.de adressieren. Bis zum Public MVP
    werden Dir Erweiterungen regelmäßig als Beta-Updates präsentiert.
  category: mvp

- question: "Wie wird DEMOCRACY finanziert?"
  answer: >-
    DEMOCRACY ist eine gemeinnützige App, das heißt von Menschen, für Menschen,
    um unsere Politik transparenter und bürgernaher zu machen. Da wir DEMOCRACY
    als eine werbefreie Plattform ohne Datenverkauf realisieren wollen, kann
    unser Joker nur die gemeinschaftliche Finanzierung sein. Insofern wird
    DEMOCRACY, um die laufenden Kosten zu decken, auch nach dem initialen
    Crowdfunding durch Spenden finanziert.
  category: finanzen

- question: "Warum braucht ihr Geld?"
  answer: >-
    Während die Konzeption der Plattform bislang hauptsächlich von freiwilliger
    Arbeit gestemmt wurde, hat der Crowdfundingerfolg DEMOCRACY Deutschland e.V.
    das Privileg verschafft, 3 Vollzeitangestellte für 6 Monate beschäftigen zu
    können, die ihre gesamte Zeit und Energie dem Projekt widmen – das hat die
    Entwicklung von DEMOCRACY extrem vorangebracht. Wenn es nach uns geht,
    möchten wir so schnell wie möglich mit dem DEMOCRACY MVP an den Start gehen,
    allerdings müssen bis dahin noch einige Meilensteine in der Entwicklung
    erreicht werden. Und dafür brauchen wir Deine finanzielle Unterstützung,
    um das Nötige zum Leben zu erhalten.
  category: finanzen


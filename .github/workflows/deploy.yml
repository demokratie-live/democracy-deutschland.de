name: Build & Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: pnpm/action-setup@v5.0.0
        with:
          version: 10

      - uses: actions/setup-node@v6.3.0
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Validate content
        run: pnpm validate-content

      - name: Unit tests
        run: pnpm test:unit

      - name: Build
        run: pnpm build

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: E2E smoke tests
        run: pnpm exec playwright test

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: website-preview-${{ github.run_id }}
          path: out
          retention-days: 7

      - name: Add preview artifact info to summary
        run: |
          {
            echo "### Preview artifact"
            echo ""
            echo "- Name: \`website-preview-${GITHUB_RUN_ID}\`"
            echo "- Download it from the workflow run artifacts and serve \`out/\` locally with \`npx serve out\`."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Pages artifact
        if: github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: out

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
